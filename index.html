<!DOCTYPE html>
<html lang="ru" data-theme="obsidian">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: http: data:; font-src 'self'; connect-src 'self' http://api.vokino.pro https://api.vokino.pro https://proxy.vokino.pro;"
    />
    <title>Vodomerka</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #0a0a0e;
      }

      #root {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
    </style>
    <script>
      try {
        var raw = localStorage.getItem('tv-leonid-settings');
        if (raw) {
          var parsed = JSON.parse(raw);
          if (parsed && parsed.theme) {
            document.documentElement.dataset.theme = parsed.theme;
          }
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
